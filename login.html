<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HG Services Admin Login</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #667085;
      --line: #d9e1e8;
      --soft: #f6f8fa;
      --brand: #1769aa;
      --brand-dark: #104d7d;
      --red: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background: #eef2f5;
      font-family: Arial, Helvetica, sans-serif;
    }

    .login-card {
      width: min(440px, 100%);
      padding: 28px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(31, 41, 51, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--brand-dark);
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 9px 11px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit;
      font-size: 15px;
    }

    input:focus {
      outline: 2px solid #b9d9ee;
      border-color: var(--brand);
    }

    button {
      width: 100%;
      min-height: 44px;
      margin-top: 20px;
      color: #ffffff;
      background: var(--brand);
      border: 0;
      border-radius: 6px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--brand-dark);
    }

    .error {
      display: none;
      margin: 16px 0 0;
      color: var(--red);
      font-weight: 700;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Admin Login</h1>
    <p>Sign in as Admin or Ops to access the HG Services operations workflow.</p>
    <form method="post" action="/api/login">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit">Log in</button>
      <p class="error" id="error">Invalid username or password.</p>
    </form>
  </div>
  <script>
    if (new URLSearchParams(window.location.search).get("error")) {
      document.getElementById("error").classList.add("visible");
    }
  </script>
</body>
</html>
